services:
  collector:
    build: .
    container_name: keleur-collector
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - KELEUR_POLL_INTERVAL=30

  api:
    build: .
    container_name: keleur-api
    restart: unless-stopped
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - collector
